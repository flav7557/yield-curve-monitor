name: Update Yield Curve Monitor

on:
  schedule:
    # 06:30 UTC on weekdays (after the U.S. Treasury posts the prior day's curve)
    - cron: "30 6 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write      # allow committing the refreshed history CSV
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate dashboard
        run: python run.py

      - name: Check output
        run: test -f output/index.html

      - name: Commit updated history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/yield_curve_history.csv
          git commit -m "chore: update yield curve history [skip ci]" || echo "No history changes to commit."
          git push || echo "Nothing to push."

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
